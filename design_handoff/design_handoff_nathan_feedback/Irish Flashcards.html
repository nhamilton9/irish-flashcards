<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Na Mílte Focal — Irish Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Karla:wght@300;400;500;600;700&family=Uncial+Antiqua&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #e8e4dc;
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="words.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "ringSize": 128,
  "showStats": true,
  "showSubtitle": false,
  "cardHeight": 320,
  "frontSize": 52,
  "accent": "#2f4a2e"
}/*EDITMODE-END*/;
window.__TWEAK_DEFAULTS = TWEAK_DEFAULTS;

// Wraps a variation in an iOS frame
function PhoneFrame({ children }) {
  return (
    <IOSDevice width={390} height={810}>
      <div style={{ position: "absolute", inset: 0 }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function DesktopFrame({ children }) {
  // Simple desktop window chrome so the layout has context
  return (
    <div style={{
      width: "100%", height: "100%",
      background: "#d7d2c4", borderRadius: 10,
      boxShadow: "0 18px 40px rgba(30,27,20,0.18)",
      display: "flex", flexDirection: "column", overflow: "hidden",
      border: "1px solid #c0baa9",
    }}>
      <div style={{
        height: 32, background: "#e8e3d4", borderBottom: "1px solid #c0baa9",
        display: "flex", alignItems: "center", padding: "0 12px", gap: 6, flexShrink: 0,
      }}>
        <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#e06c5f" }} />
        <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#e6b34d" }} />
        <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#78c256" }} />
        <span style={{ marginLeft: 14, fontSize: 11, color: "#6b6659", fontFamily: "Karla, sans-serif" }}>
          Na Mílte Focal
        </span>
      </div>
      <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Na Mílte Focal"
      subtitle="Full flow · phone + desktop"
    >
      <DCSection id="phone" title="iPhone · 390×810">
        <DCArtboard id="var-a-phone" label="A · Phone" width={390} height={810} kind="mobile">
          <PhoneFrame>
            <VariationA />
          </PhoneFrame>
        </DCArtboard>
      </DCSection>
      <DCSection id="desktop" title="Desktop · 1200×780">
        <DCArtboard id="var-a-desktop" label="A · Desktop" width={1200} height={780} kind="desktop">
          <DesktopFrame>
            <VariationA />
          </DesktopFrame>
        </DCArtboard>
      </DCSection>
      <DCSection id="archived" title="Archived · Atlantic Dusk">
        <DCArtboard id="var-b" label="B · Atlantic Dusk (not chosen)" width={390} height={810} kind="mobile">
          <PhoneFrame>
            <VariationB />
          </PhoneFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
